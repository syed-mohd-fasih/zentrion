apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: securityprofiles.zentrion.io
  annotations:
    description: "Tracks normal traffic patterns and behavioral baselines for services"
spec:
  group: zentrion.io
  names:
    kind: SecurityProfile
    listKind: SecurityProfileList
    plural: securityprofiles
    singular: securityprofile
    shortNames:
      - sp
      - secprof
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - serviceName
              properties:
                serviceName:
                  type: string
                  description: "Name of the service this profile applies to"
                namespace:
                  type: string
                  description: "Namespace of the service"
                  default: "default"
                baseline:
                  type: object
                  description: "Normal traffic baseline"
                  properties:
                    requestsPerSecond:
                      type: number
                      description: "Average RPS during normal operation"
                    errorRate:
                      type: number
                      description: "Normal error rate percentage"
                    avgLatencyMs:
                      type: integer
                      description: "Average latency in milliseconds"
                    peakRequestsPerSecond:
                      type: number
                      description: "Peak RPS observed"
                allowedSources:
                  type: array
                  description: "List of allowed source services"
                  items:
                    type: object
                    properties:
                      service:
                        type: string
                      namespace:
                        type: string
                allowedDestinations:
                  type: array
                  description: "List of allowed destination services"
                  items:
                    type: object
                    properties:
                      service:
                        type: string
                      namespace:
                        type: string
                knownEndpoints:
                  type: array
                  description: "List of known API endpoints"
                  items:
                    type: object
                    properties:
                      path:
                        type: string
                      methods:
                        type: array
                        items:
                          type: string
                      avgLatencyMs:
                        type: integer
                allowedIpRanges:
                  type: array
                  description: "Whitelisted IP ranges"
                  items:
                    type: string
                learningPeriod:
                  type: object
                  description: "Learning period configuration"
                  properties:
                    startTime:
                      type: string
                      format: date-time
                    endTime:
                      type: string
                      format: date-time
                    status:
                      type: string
                      enum:
                        - learning
                        - learned
                        - active
            status:
              type: object
              properties:
                lastUpdated:
                  type: string
                  format: date-time
                dataPoints:
                  type: integer
                  description: "Number of data points used to build this profile"
                confidence:
                  type: number
                  description: "Confidence score (0-1) of this profile"
                anomaliesDetected:
                  type: integer
                  description: "Total anomalies detected against this profile"
      additionalPrinterColumns:
        - name: Service
          type: string
          jsonPath: .spec.serviceName
        - name: Status
          type: string
          jsonPath: .spec.learningPeriod.status
        - name: Confidence
          type: number
          jsonPath: .status.confidence
        - name: Anomalies
          type: integer
          jsonPath: .status.anomaliesDetected
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
