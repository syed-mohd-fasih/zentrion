apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: anomalyrecords.zentrion.io
  annotations:
    description: "Persistent records of detected anomalies in the service mesh"
spec:
  group: zentrion.io
  names:
    kind: AnomalyRecord
    listKind: AnomalyRecordList
    plural: anomalyrecords
    singular: anomalyrecord
    shortNames:
      - ar
      - anomaly
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - anomalyId
                - type
                - severity
                - serviceName
                - detectedAt
              properties:
                anomalyId:
                  type: string
                  description: "Unique ID for this anomaly"
                type:
                  type: string
                  enum:
                    - UNUSUAL_SOURCE
                    - UNEXPECTED_COMMUNICATION
                    - NEW_ENDPOINT
                    - HIGH_ERROR_RATE
                    - TRAFFIC_SPIKE
                    - SUSPICIOUS_PATTERN
                    - LATENCY_ANOMALY
                    - UNAUTHORIZED_ACCESS
                  description: "Type of anomaly detected"
                severity:
                  type: string
                  enum:
                    - low
                    - medium
                    - high
                    - critical
                  description: "Severity level"
                serviceName:
                  type: string
                  description: "Affected service name"
                namespace:
                  type: string
                  description: "Namespace of affected service"
                  default: "default"
                detectedAt:
                  type: string
                  format: date-time
                  description: "When anomaly was first detected"
                details:
                  type: string
                  description: "Human-readable description of the anomaly"
                evidence:
                  type: object
                  description: "Evidence supporting this anomaly"
                  properties:
                    sourceIp:
                      type: string
                    destinationIp:
                      type: string
                    requestCount:
                      type: integer
                    errorCount:
                      type: integer
                    avgLatencyMs:
                      type: integer
                    suspiciousPatterns:
                      type: array
                      items:
                        type: string
                associatedLogs:
                  type: array
                  description: "IDs of logs related to this anomaly"
                  items:
                    type: string
                associatedMetrics:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: "Relevant metrics at time of detection"
                suggestedPolicyId:
                  type: string
                  description: "ID of auto-generated policy draft (if any)"
                falsePositive:
                  type: boolean
                  description: "Marked as false positive by analyst"
                  default: false
                resolvedAt:
                  type: string
                  format: date-time
                  description: "When this anomaly was resolved"
                resolvedBy:
                  type: string
                  description: "User who resolved this anomaly"
                resolutionNotes:
                  type: string
                  description: "Notes on how this was resolved"
            status:
              type: object
              properties:
                state:
                  type: string
                  enum:
                    - active
                    - investigating
                    - resolved
                    - false_positive
                  description: "Current state of this anomaly"
                policyApplied:
                  type: boolean
                  description: "Whether a policy was applied to mitigate this"
                appliedPolicyName:
                  type: string
                  description: "Name of K8s policy resource that was applied"
                occurrenceCount:
                  type: integer
                  description: "How many times this anomaly pattern has occurred"
                lastOccurrence:
                  type: string
                  format: date-time
                  description: "Most recent occurrence"
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Severity
          type: string
          jsonPath: .spec.severity
        - name: Service
          type: string
          jsonPath: .spec.serviceName
        - name: State
          type: string
          jsonPath: .status.state
        - name: Detected
          type: date
          jsonPath: .spec.detectedAt
